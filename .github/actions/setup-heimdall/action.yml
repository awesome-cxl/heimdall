name: "Set up Heimdall dependencies"
author: "@zxwang42"
description: "Set up GitHub workflow dependencies for https://github.com/awesome-cxl/heimdall/"
branding:
  icon: "truck"
  color: "gray-dark"
inputs:
  poetry-version:
    description: "The version of poetry to install"
    required: false
    default: "latest"
  python-version:
    description: "The version of Python to install"
    required: false
    default: "3.12"
runs:
  using: "composite"
  steps:
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install poetry
      uses: ./.github/actions/install-poetry
      with:
        poetry-version: ${{ inputs.poetry-version }}
    - name: Setup a local virtual environment (if no poetry.toml file)
      run: |
        poetry config virtualenvs.create true --local
        poetry config virtualenvs.in-project true --local
      shell: bash
    - uses: actions/cache@v3
      name: Define a cache for the virtual environment based on the dependencies lock file
      with:
        path: ./.venv
        key: venv-${{ hashFiles('poetry.lock') }}
    - name: Install the Python dependencies
      run: poetry install
      shell: bash
    - name: Set up env file for basic performance build
      run: cp benchmark/basic_performance/env_files/machine_template.env benchmark/basic_performance/env_files/$(hostname).env
      shell: bash
    - name: Install packages
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libnuma-dev
      shell: bash
