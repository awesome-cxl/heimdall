name: Build all benchmarks
on: push
jobs:
  build-poetry:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"] # Maybe also some other versions like 3.13
        poetry-version: ["latest"] # Maybe also "main" and "2.0.0"
        os: [ubuntu-latest] # Maybe also macos-latest, windows-latest
    runs-on: ${{ matrix.os }}
    env:
      USER_PASSWORD: "does_not_matter" # GitHub action should run `sudo` without password
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up dependencies
        uses: ./.github/actions/setup-heimdall
        with:
          python-version: ${{ matrix.python-version }}
          poetry-version: ${{ matrix.poetry-version }}

      - name: "[Poetry] Build basic performance bandwidth tests"
        run: poetry run heimdall bench build basic bw
      - name: "[Poetry] Install deps of lockfree data structures benchmark"
        run: poetry run heimdall bench install lockfree all
      - name: "[Poetry] Build lockfree data structures benchmark tests"
        run: poetry run heimdall bench build lockfree all
      - name: "[Poetry] Run lockfree data structures benchmark basic tests"
        run: poetry run heimdall bench run lockfree basic

  build-standalone:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"] # Maybe also some other versions like 3.13
        poetry-version: ["latest"] # Maybe also "main" and "2.0.0"
        os: [ubuntu-latest] # Maybe also macos-latest, windows-latest
    runs-on: ${{ matrix.os }}
    env:
      USER_PASSWORD: "does_not_matter" # GitHub action should run `sudo` without password
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up dependencies
        uses: ./.github/actions/setup-heimdall
        with:
          python-version: ${{ matrix.python-version }}
          poetry-version: ${{ matrix.poetry-version }}

      - name: Build standalone heimdall binary
        run: make standalone
        shell: bash

      - name: "Build basic performance bandwidth tests"
        run: ./dist/heimdall bench build basic bw
